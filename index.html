<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>人机实验系统 - 流程控制版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: "Microsoft YaHei", sans-serif; background-color: #f4f7f9; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .setup-panel { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; width: 700px; text-align: center; }
        select { padding: 10px; font-size: 16px; border-radius: 6px; border: 1px solid #ddd; margin: 0 10px; }
        .container { display: flex; gap: 30px; margin-top: 10px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 400px; display: flex; flex-direction: column; }
        .qr-section { background: #fafafa; padding: 15px; border-radius: 8px; border: 1px solid #eee; margin-bottom: 15px; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
        .qr-wrapper { margin: 10px auto; display: flex; justify-content: center; min-height: 180px; align-items: center; }
        .info-label { font-size: 0.9rem; color: #666; margin-bottom: 5px; }
        .info-value { font-size: 1.8rem; font-weight: 900; color: #007bff; }
        .highlight-letter { color: #e83e8c; font-size: 2.5rem; }
        .group-big-num { font-size: 8rem; font-weight: 900; color: #333; margin: 20px 0; }
        
        .btn { padding: 15px 20px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; width: 100%; font-weight: bold; }
        .btn-start { background-color: #007bff; color: white; width: auto; }
        .btn-next { background-color: #28a745; color: white; margin-top: 10px; }
        .btn-draw { background-color: #6f42c1; color: white; margin-top: 10px; }
        .btn:disabled { background-color: #ccc; cursor: not-allowed; }
        
        #experiment-area { display: none; width: 100%; max-width: 900px; }
        .footer { margin-top: 40px; text-align: center; width: 100%; }
        .reset-link { font-size: 0.8rem; color: #999; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

    <h1>人机协作实验控制台</h1>

    <div class="setup-panel" id="setup-panel">
        <h3>实验准备：请选择拉丁方方案</h3>
        <select id="sequence-select">
            <option value="0">方案 1 (1-2-6-3-5-4)</option>
            <option value="1">方案 2 (2-3-1-4-6-5)</option>
            <option value="2">方案 3 (3-4-2-5-1-6)</option>
            <option value="3">方案 4 (4-5-3-6-2-1)</option>
            <option value="4">方案 5 (5-6-4-1-3-2)</option>
            <option value="5">方案 6 (6-1-5-2-4-3)</option>
        </select>
        <button class="btn btn-start" onclick="startExperiment()">确认并锁定</button>
    </div>

    <div id="experiment-area">
        <div class="container" style="justify-content: center;">
            
            <div class="card">
                <h2 style="margin-top:0">1. 扫码填表区</h2>
                
                <div class="qr-section">
                    <div class="info-label">① 基础量表 (固定)</div>
                    <div id="scale-qr" class="qr-wrapper"></div>
                </div>

                <div class="qr-section">
                    <div class="info-label">② 知识测试问卷 (不放回随机)</div>
                    <div id="knowledge-qr" class="qr-wrapper"></div>
                    <div class="info-value highlight-letter" id="current-letter">-</div>
                </div>

                <button id="draw-btn" class="btn btn-draw" onclick="drawKnowledgeTest()" disabled>抽取当前组测试问卷</button>
            </div>

            <div class="card">
                <h2 style="margin-top:0">2. 实验任务提示</h2>
                <div class="qr-section" style="background: #fff; border: 2px solid #eee;">
                    <div class="info-label">当前实验组数字</div>
                    <div class="group-big-num" id="current-group-num">-</div>
                    <p id="progress-text" style="color:#888">完成进度: 0 / 6</p>
                </div>
                
                <button id="next-btn" class="btn btn-next" onclick="nextTask()">显示下一个实验任务</button>
                <p style="font-size: 0.8rem; color: #999; margin-top: 10px;">提示：切换任务后需重新抽取左侧问卷</p>
            </div>

        </div>
        
        <div class="footer">
            <div id="full-sequence-display" style="color:#aaa; font-size:0.9rem; margin-bottom:15px"></div>
            <span class="reset-link" onclick="location.reload()">重置并更换方案</span>
        </div>
    </div>

    <script>
        // --- 1. 配置信息 ---
        const SCALE_URL = "https://v.wjx.cn/vm/miavqVf.aspx#"; // 量表地址
        
        const KNOWLEDGE_TESTS = { // 知识测试 A-F
            'A': 'https://link.to/testA', 'B': 'https://link.to/testB', 'C': 'https://link.to/testC',
            'D': 'https://link.to/testD', 'E': 'https://link.to/testE', 'F': 'https://link.to/testF'
        };

        const SEQUENCES = [ // 拉丁方数字序列
            [1, 2, 6, 3, 5, 4], [2, 3, 1, 4, 6, 5], [3, 4, 2, 5, 1, 6],
            [4, 5, 3, 6, 2, 1], [5, 6, 4, 1, 3, 2], [6, 1, 5, 2, 4, 3]
        ];

        // --- 2. 逻辑控制 ---
        let letterPool = ['A', 'B', 'C', 'D', 'E', 'F'];
        let activeSeq = [];
        let stepIndex = 0;
        let scaleQr, knowledgeQr;

        window.onload = function() {
            scaleQr = new QRCode(document.getElementById("scale-qr"), { width: 180, height: 180 });
            knowledgeQr = new QRCode(document.getElementById("knowledge-qr"), { width: 180, height: 180 });
        };

        function startExperiment() {
            const idx = document.getElementById('sequence-select').value;
            activeSeq = SEQUENCES[idx];
            document.getElementById('setup-panel').style.display = 'none';
            document.getElementById('experiment-area').style.display = 'block';
            
            scaleQr.makeCode(SCALE_URL); // 初始化固定量表
            document.getElementById('full-sequence-display').innerText = "预定顺序: " + activeSeq.join(" → ");
        }

        // 右侧：切换任务
        function nextTask() {
            if (stepIndex < 6) {
                const groupNum = activeSeq[stepIndex];
                
                // 1. 更新大数字显示
                document.getElementById('current-group-num').innerText = groupNum;
                
                // 2. 更新进度
                stepIndex++;
                document.getElementById('progress-text').innerText = `完成进度: ${stepIndex} / 6`;
                
                // 3. 开启左侧抽取权限
                document.getElementById('draw-btn').disabled = false;
                document.getElementById('draw-btn').innerText = "抽取第 " + groupNum + " 组的测试问卷";
                
                // 4. 重置左侧字母显示
                knowledgeQr.clear();
                document.getElementById('current-letter').innerText = "等待抽取";

                if(stepIndex === 6) {
                    document.getElementById('next-btn').disabled = true;
                    document.getElementById('next-btn').innerText = "实验任务已结束";
                }
            }
        }

        // 左侧：抽取知识测试
        function drawKnowledgeTest() {
            if (letterPool.length > 0) {
                const randIdx = Math.floor(Math.random() * letterPool.length);
                const letter = letterPool.splice(randIdx, 1)[0];
                
                // 生成对应的二维码
                knowledgeQr.makeCode(KNOWLEDGE_TESTS[letter]);
                document.getElementById('current-letter').innerText = letter;
                
                // 锁定按钮，直到切换到下一个任务
                document.getElementById('draw-btn').disabled = true;
                document.getElementById('draw-btn').innerText = "已抽取，请完成填写";
            }
        }
    </script>
</body>
</html>
