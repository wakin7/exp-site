<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>实验流程控制 - 修复参数版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #007bff; --secondary: #6f42c1; --success: #28a745; --bg: #f4f7f9; }
        body { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; background-color: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .setup-panel { background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 20px; width: 800px; text-align: center; }
        .input-group { margin: 15px 0; display: flex; justify-content: center; gap: 15px; }
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        #experiment-area { display: none; width: 100%; max-width: 1000px; }
        .container { display: flex; gap: 30px; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; flex: 1; }
        .qr-section { background: #fafafa; padding: 15px; border-radius: 12px; border: 1px solid #eee; margin-bottom: 15px; }
        .qr-wrapper { margin: 10px auto; display: flex; justify-content: center; min-height: 180px; align-items: center; }
        .info-value { font-size: 2rem; font-weight: 900; color: var(--primary); }
        .btn { padding: 15px 20px; font-size: 17px; border: none; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; }
        .btn-start { background: var(--primary); color: white; width: auto; }
        .btn-next { background: var(--success); color: white; margin-top: 10px; }
        .btn-confirm { background: var(--secondary); color: white; margin-top: 10px; }
        .btn:disabled { background: #ccc !important; opacity: 0.7; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 50px; font-size: 0.8rem; margin-top: 5px; }
        .waiting { background: #fff3cd; color: #856404; }
        .completed { background: #d4edda; color: #155724; }
    </style>
</head>
<body>

    <h1>人机协作实验控制台</h1>

    <div class="setup-panel" id="setup-panel">
        <h3>实验初始设置</h3>
        <div class="input-group">
            <div>
                <label>被试编号 (SID):</label><br>
                <input type="number" id="sid-input" placeholder="01">
            </div>
            <div>
                <label>选择方案:</label><br>
                <select id="seq-select">
                    <option value="0">方案 1 (1-2-6-3-5-4)</option>
                    <option value="1">方案 2 (2-3-1-4-6-5)</option>
                    <option value="2">方案 3 (3-4-2-5-1-6)</option>
                    <option value="3">方案 4 (4-5-3-6-2-1)</option>
                    <option value="4">方案 5 (5-6-4-1-3-2)</option>
                    <option value="5">方案 6 (6-1-5-2-4-3)</option>
                </select>
            </div>
        </div>
        <button class="btn btn-start" onclick="initExperiment()">锁定并开始实验</button>
    </div>

    <div id="experiment-area">
        <div class="container">
            <div class="card">
                <h2 style="margin:0 0 15px 0">1. 扫码填表区</h2>
                <div class="qr-section">
                    <div style="font-size:0.8rem; color:#888">① 固定量表 (SID: <span class="sid-txt">--</span>)</div>
                    <div id="scale-qr" class="qr-wrapper"></div>
                </div>
                <div class="qr-section">
                    <div style="font-size:0.8rem; color:#888">② 知识测试 (SID: <span class="sid-txt">--</span>)</div>
                    <div id="knowledge-qr" class="qr-wrapper"></div>
                    <div class="info-value" id="cur-letter" style="color:var(--secondary); font-size:2.5rem">-</div>
                    <div id="fill-status" class="status-badge waiting">等待填写...</div>
                </div>
                <button id="confirm-btn" class="btn btn-confirm" onclick="confirmStep()" disabled>确认已填写</button>
            </div>

            <div class="card">
                <h2 style="margin:0 0 15px 0">2. 实验任务</h2>
                <div class="qr-section" style="background:#fff; min-height:300px; display:flex; flex-direction:column; justify-content:center">
                    <div style="font-size:0.9rem; color:#666">当前实验组数字</div>
                    <div style="font-size:8rem; font-weight:900" id="group-num">-</div>
                    <p id="progress" style="color:#999">进度: 0 / 6</p>
                </div>
                <button id="next-btn" class="btn btn-next" onclick="nextTask()">显示第一组任务</button>
            </div>
        </div>
        <div style="margin-top:30px; color:#aaa; cursor:pointer" onclick="location.reload()">[ 重置实验 ]</div>
    </div>

    <script>
        const SCALE_URL = "https://v.wjx.cn/vm/miavqVf.aspx#"; 
        const KNOWLEDGE_URLS = { 
            'A': 'https://ks.wjx.com/vm/rFUV6Lw.aspx#', 'B': 'https://ks.wjx.com/vm/Y9R3Ed3.aspx#', 
            'C': 'https://ks.wjx.com/vm/Q5e01MX.aspx#', 'D': 'https://ks.wjx.com/vm/Or3JZnl.aspx#', 
            'E': 'https://ks.wjx.com/vm/PLKZDY2.aspx#', 'F': 'https://ks.wjx.com/vm/POY2KTH.aspx#'
        };
        const SEQS = [ [1,2,6,3,5,4],[2,3,1,4,6,5],[3,4,2,5,1,6],[4,5,3,6,2,1],[5,6,4,1,3,2],[6,1,5,2,4,3] ];

        let sid = "", pool = ['A','B','C','D','E','F'], activeSeq = [], step = 0;
        let qrS, qrK;

        window.onload = () => {
            qrS = new QRCode(document.getElementById("scale-qr"), { width: 180, height: 180 });
            qrK = new QRCode(document.getElementById("knowledge-qr"), { width: 180, height: 180 });
        };

        // 核心修复函数：安全地拼接参数
        function buildUrl(base, id) {
            let clean = base.split('#')[0]; // 去掉末尾的 #
            return `${clean}?s=${id}#`;    // 重新拼接为 ...aspx?s=01#
        }

        function initExperiment() {
            sid = document.getElementById('sid-input').value;
            if(!sid) return alert("请输入编号");
            activeSeq = SEQS[document.getElementById('seq-select').value];
            document.getElementById('setup-panel').style.display = 'none';
            document.getElementById('experiment-area').style.display = 'block';
            document.querySelectorAll('.sid-txt').forEach(e => e.innerText = sid);
            qrS.makeCode(buildUrl(SCALE_URL, sid));
        }

        function nextTask() {
            if (step < 6) {
                document.getElementById('group-num').innerText = activeSeq[step];
                const letter = pool.splice(Math.floor(Math.random()*pool.length), 1)[0];
                qrK.makeCode(buildUrl(KNOWLEDGE_URLS[letter], sid));
                document.getElementById('cur-letter').innerText = letter;
                document.getElementById('next-btn').disabled = true;
                document.getElementById('confirm-btn').disabled = false;
                document.getElementById('fill-status').className = "status-badge waiting";
                document.getElementById('fill-status').innerText = "等待填写...";
                step++;
                document.getElementById('progress').innerText = `进度: ${step} / 6`;
            }
        }

        function confirmStep() {
            document.getElementById('confirm-btn').disabled = true;
            document.getElementById('fill-status').className = "status-badge completed";
            document.getElementById('fill-status').innerText = "确认完成 ✓";
            document.getElementById('next-btn').disabled = false;
            if(step === 6) document.getElementById('next-btn').innerText = "实验结束";
        }
    </script>
</body>
</html>
